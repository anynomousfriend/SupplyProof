<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#888888;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="128" fill="#000000" />
  
  <path d="M256 112 L384 184 L384 328 L256 400 L128 328 L128 184 Z" stroke="url(#grad1)" stroke-width="24" stroke-linejoin="round" fill="rgba(255,255,255,0.03)" filter="url(#glow)"/>
  
  <line x1="256" y1="112" x2="256" y2="256" stroke="#ffffff" stroke-width="24" stroke-linecap="round"/>
  <line x1="384" y1="328" x2="256" y2="256" stroke="#ffffff" stroke-width="24" stroke-linecap="round"/>
  <line x1="128" y1="328" x2="256" y2="256" stroke="#ffffff" stroke-width="24" stroke-linecap="round"/>
  
  <circle cx="256" cy="256" r="40" fill="#ffffff" filter="url(#glow)"/>
</svg>